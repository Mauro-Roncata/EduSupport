spring.application.name=edusupport
spring.profiles.active=dev

# Configuração de conexão com o MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/edusupport_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update: Cria as tabelas se não existirem, ou atualiza se mudar a entidade
spring.jpa.hibernate.ddl-auto=update
# show-sql: Mostra no terminal os comandos INSERT/SELECT do Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações de E-mail (Mailtrap)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
# Usuário e senha gerados no Mailtrap:
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true