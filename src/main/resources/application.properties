spring.application.name=edusupport
spring.profiles.active=dev

# Configurações do Banco de Dados H2 (Em Memória)
spring.datasource.url=jdbc:h2:mem:edusupport_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita o painel do H2 no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# update: Cria as tabelas se não existirem, ou atualiza se mudar a entidade
spring.jpa.hibernate.ddl-auto=update
# show-sql: Mostra no terminal os comandos INSERT/SELECT do Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações de E-mail (Mailtrap)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
# Usuário e senha gerados no Mailtrap:
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true